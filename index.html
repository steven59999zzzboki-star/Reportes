<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportes - Steven Studio</title>
    <style>
        /* --- PANTALLA DE CARGA (INTRO) --- */
        #fade-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10000; opacity: 1;
            transition: opacity 0.8s ease-in-out; display: flex;
            align-items: center; justify-content: center; pointer-events: all;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #050505; color: #fff; text-align: center; }
        
        /* Barra Superior */
        .top-nav { display: flex; align-items: center; justify-content: space-between; padding: 10px 15px; background: #111; border-bottom: 1px solid #222; }
        .btn-volver { background: #222; color: #eee; border: 1px solid #444; padding: 6px 12px; border-radius: 5px; text-decoration: none; font-size: 0.8rem; font-weight: bold; }
        .btn-volver:hover { background: #333; border-color: #666; }

        .header-title-top { color: #ff0000; font-weight: bold; font-size: 1rem; flex-grow: 1; text-align: center; margin-right: 80px; }

        .navbar { height: 50px; background: #111; border-bottom: 1px solid #222; display: flex; position: sticky; width: 100%; top: 0; z-index: 1000; }
        .nav-tab { flex: 1; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; color: #555; font-size: 0.8rem; }
        .nav-tab.active { color: #ff0000; border-bottom: 2px solid #ff0000; background: #1a0000; }
        .nav-tab.premium-active { color: #ffcc00; border-bottom: 2px solid #ffcc00; background: #1a1500; }

        .container { padding: 15px; display: flex; flex-direction: column; gap: 20px; max-width: 500px; margin: 0 auto; }
        .game-card { background: #111; border: 1px solid #222; border-radius: 10px; cursor: pointer; overflow: hidden; width: 100%; position: relative; }
        .game-image { width: 100%; height: auto; display: block; }
        .game-info { padding: 12px; font-size: 0.9rem; }

        #report-selection { display: none; position: fixed; inset: 0; background: #050505; z-index: 2000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .option-btn { background: #ff0000; border: none; color: #fff; padding: 20px; width: 100%; max-width: 300px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.1rem; text-transform: uppercase; }
        .back-btn-report { position: absolute; top: 15px; left: 15px; background: none; border: 1px solid #333; color: #666; padding: 5px 10px; border-radius: 4px; }
        .hidden { display: none !important; }

        .report-input { background: #111; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 5px; width: 100%; max-width: 300px; margin-bottom: 10px; font-size: 0.9rem; resize: none; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; max-width: 300px; margin-bottom: 15px; }
        .quick-tag { background: #222; border: 1px solid #444; color: #aaa; padding: 5px 10px; border-radius: 4px; font-size: 0.7rem; cursor: pointer; }
    </style>
</head>
<body>

    <div id="fade-overlay">
        <h2 style="color: #ff0000; font-family: monospace; letter-spacing: 2px;">REPORTE ESTUDIO</h2>
    </div>

    <div class="top-nav">
        <a href="https://steven59999zzzboki-star.github.io/Hxh/" class="btn-volver">← VOLVER</a>
        <div class="header-title-top">Reportar Fallos</div>
    </div>

    <nav class="navbar">
        <div id="tab-free" class="nav-tab active" onclick="showTab('free')">REPORTAR NORMAL</div>
        <div id="tab-premium" class="nav-tab" onclick="showTab('premium')">REPORTAR PREMIUM ⭐</div>
    </nav>

    <div id="cont-free" class="container"></div>

    <div id="cont-premium" class="container hidden"></div>

    <div id="report-selection">
        <button class="back-btn-report" onclick="location.reload()">← VOLVER</button>
        <h2 id="sel-title" style="margin-bottom:10px; color:#ff0000;">Reportar Script</h2>
        <p id="sel-version" style="font-size:0.8rem; color:#666; margin-bottom:15px;"></p>
        
        <div class="btn-group">
            <div class="quick-tag" onclick="fillDesc('No ejecuta')">No ejecuta</div>
            <div class="quick-tag" onclick="fillDesc('No sé cómo usarlo')">No sé usarlo</div>
            <div class="quick-tag" onclick="fillDesc('Se cierra el juego')">Se cierra</div>
            <div class="quick-tag" onclick="fillDesc('Botones invisibles')">Botones invisibles</div>
        </div>

        <textarea id="report-desc" class="report-input" rows="4" placeholder="¿Qué está pasando con el script?"></textarea>
        
        <button class="option-btn" id="btn-env" onclick="sendFullReport()">Mandar Reporte</button>
    </div>

    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1498363532616401006/y8thQBg1DkBysmiBWSEKHLaapW3xI7uiIdlAXCa8clU1NTcQzMnF573-TJF-HSHAwlfc";
        const VINCULO_EXCEL = "https://docs.google.com/spreadsheets/d/10DlgHwmLWQskxFFL0Xe-QUYECH-U8BjroPttI5P6_Fg/edit?usp=drivesdk";
        const CSV_URL = VINCULO_EXCEL.split('/edit')[0] + "/export?format=csv&cachebuster=" + Date.now();
        
        let currentScript = "";
        let currentVer = "";

        window.addEventListener('load', () => { 
            loadExternalScripts();
            setTimeout(() => { 
                const overlay = document.getElementById('fade-overlay');
                overlay.style.opacity = '0'; 
                setTimeout(() => { overlay.style.display = 'none'; }, 800); 
            }, 1300);
        });

        async function loadExternalScripts() {
            try {
                const res = await fetch(CSV_URL);
                const data = await res.text();
                const rows = data.split("\n").slice(1);
                
                rows.forEach(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length < 5) return;
                    
                    let [nombre, imagen, script, version, orden] = cols.map(c => c.replace(/^"|"$/g, '').trim());
                    if(!nombre || !imagen) return;
                    
                    const isPremium = version && version.toLowerCase() === 'premium';
                    const verLabel = isPremium ? 'Premium ⭐' : 'Normal';
                    
                    const cardHtml = `
                        <div class="game-card" id="card-${nombre.replace(/\s+/g, '')}" style="${isPremium ? 'border-color: #ffcc00;' : ''}" 
                             onclick="selectScript('${nombre}', '${verLabel}')">
                            <img src="${imagen}" class="game-image">
                            <div class="game-info">
                                <h3>${nombre}</h3>
                                <p style="color:${isPremium ? '#ffcc00' : '#ff0000'};">Reportar ${isPremium ? 'Premium' : 'Fallo'}</p>
                            </div>
                        </div>`;

                    const container = document.getElementById(isPremium ? 'cont-premium' : 'cont-free');
                    const instruccion = orden ? orden.toLowerCase() : "";

                    if (instruccion.includes("arriba de ")) {
                        let targetName = instruccion.replace("arriba de ", "").split(" en ")[0].replace(/\s+/g, '');
                        let targetCard = document.getElementById("card-" + targetName);
                        if (targetCard) { targetCard.insertAdjacentHTML('beforebegin', cardHtml); } 
                        else { container.insertAdjacentHTML('afterbegin', cardHtml); }
                    } 
                    else if (instruccion.includes("abajo de ")) {
                        let targetName = instruccion.replace("abajo de ", "").split(" en ")[0].replace(/\s+/g, '');
                        let targetCard = document.getElementById("card-" + targetName);
                        if (targetCard) { targetCard.insertAdjacentHTML('afterend', cardHtml); } 
                        else { container.insertAdjacentHTML('beforeend', cardHtml); }
                    } 
                    else if (instruccion === 'arriba') {
                        container.insertAdjacentHTML('afterbegin', cardHtml);
                    } 
                    else {
                        container.insertAdjacentHTML('beforeend', cardHtml);
                    }
                });
            } catch (e) { console.error("Error Excel."); }
        }

        function showTab(type) {
            document.getElementById('cont-free').classList.toggle('hidden', type !== 'free');
            document.getElementById('cont-premium').classList.toggle('hidden', type !== 'premium');
            document.getElementById('tab-free').className = 'nav-tab' + (type === 'free' ? ' active' : '');
            document.getElementById('tab-premium').className = 'nav-tab' + (type === 'premium' ? ' premium-active' : '');
        }

        function selectScript(name, version) {
            currentScript = name;
            currentVer = version;
            document.getElementById('sel-title').innerText = "Script: " + name;
            document.getElementById('sel-version').innerText = "Versión: " + version;
            document.getElementById('report-selection').style.display = 'flex';
        }

        function fillDesc(txt) {
            document.getElementById('report-desc').value = txt;
        }

        async function sendFullReport() {
            const description = document.getElementById('report-desc').value.trim();
            if(!description) return alert("Por favor escribe el problema.");
            
            const btn = document.getElementById('btn-env');
            btn.disabled = true;
            btn.innerText = "ENVIANDO...";

            const msg = { 
                content: "🚨 **NUEVO REPORTE ENTRANTE**", 
                embeds: [{ 
                    title: "Script: " + currentScript, 
                    description: "⚠️ **Fallo reportado:**\n" + description,
                    fields: [{ name: "💎 Versión", value: currentVer, inline: true }],
                    color: currentVer.includes('Premium') ? 16763904 : 16711680, 
                    timestamp: new Date() 
                }] 
            };
            
            try {
                await fetch(WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(msg) });
                alert("¡Reporte enviado!");
                location.reload();
            } catch (e) { 
                alert("Error al enviar."); 
                btn.disabled = false;
                btn.innerText = "MANDAR REPORTE";
            }
        }
    </script>
</body>
</html>
